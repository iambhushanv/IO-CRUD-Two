
<div class="card">
    
    <div class="card-body">
        <h3 class="font-weight-bold text-center">{{isInEditMode? 'Update Post' : 'Add Post'}}</h3>
        <div class="form-group">
            <label class="font-weight-bold" for="title">Title</label>
            <input #title type="text" class="form-control">
        </div>

        <div class="form-group">
            <label class="font-weight-bold" for="title">Content</label>
            <input #content type="text" class="form-control">
        </div>

         <div class="form-group">
            <label class="font-weight-bold" for="userId">User Id</label>
            <select #userId class="form-control">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select>
        </div>
        <button 
        *ngIf="!isInEditMode"
        (click)="onPostAdd()"
        mat-raised-button color="primary" class="btn-block">Add Post</button>
         <button 
        (click)="onUpdate()"
         *ngIf="isInEditMode"
        mat-raised-button color="warn" class="btn-block">Update Post</button>
    </div>
</div>
